services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "4000:4000"
  frontend:
    build: ./client
    env_file: .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - VITE_API_URL=http://backend:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend
